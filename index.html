<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MasterService v2 | Gestión de Órdenes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
        .tab-active { border-bottom: 2px solid #4f46e5; color: #4f46e5; }
        .status-badge { padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; }
        .status-revision { background: #e2e8f0; color: #475569; }
        .status-reparacion { background: #dbeafe; color: #2563eb; }
        .status-reparado { background: #dcfce7; color: #166534; }
        .status-entregado { background: #fef3c7; color: #92400e; }
    </style>
</head>
<body class="pb-12">

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-2">
                    <div class="bg-indigo-600 p-2 rounded-lg text-white"><i data-lucide="wrench"></i></div>
                    <span class="text-xl font-bold text-slate-800">MasterService</span>
                </div>
                <div class="flex gap-6 text-sm font-medium text-slate-500">
                    <button onclick="switchTab('orders')" id="tab-orders" class="tab-active py-5">Órdenes</button>
                    <button onclick="switchTab('clients')" id="tab-clients" class="py-5">Clientes</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 mt-8">
        
        <div class="mb-8 relative max-w-2xl mx-auto">
            <i data-lucide="search" class="absolute left-4 top-3 text-slate-400 w-5 h-5"></i>
            <input type="text" id="globalSearch" onkeyup="filterContent()" placeholder="Buscar por cliente, celular o # de orden..." 
                   class="w-full pl-12 pr-4 py-3 rounded-2xl border-none shadow-sm focus:ring-2 focus:ring-indigo-500 bg-white">
        </div>

        <div id="view-orders">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-slate-800">Lista de Órdenes</h2>
                <button onclick="openOrderModal()" class="bg-indigo-600 text-white px-4 py-2 rounded-xl flex items-center gap-2 hover:bg-indigo-700 transition">
                    <i data-lucide="plus"></i> Nueva Orden
                </button>
            </div>
            <div id="orders-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <div id="view-clients" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-slate-800">Directorio de Clientes</h2>
                <button onclick="openClientModal()" class="bg-emerald-600 text-white px-4 py-2 rounded-xl flex items-center gap-2 hover:bg-emerald-700 transition">
                    <i data-lucide="user-plus"></i> Nuevo Cliente
                </button>
            </div>
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b border-slate-200">
                        <tr>
                            <th class="px-6 py-4 text-sm font-semibold text-slate-600">Cliente</th>
                            <th class="px-6 py-4 text-sm font-semibold text-slate-600">Cédula/NIT</th>
                            <th class="px-6 py-4 text-sm font-semibold text-slate-600">Teléfono</th>
                            <th class="px-6 py-4 text-sm font-semibold text-slate-600">Correo</th>
                        </tr>
                    </thead>
                    <tbody id="clients-table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="client-modal" class="fixed inset-0 bg-slate-900/60 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl w-full max-w-md p-6 shadow-2xl">
            <h3 class="text-xl font-bold mb-4">Registrar Nuevo Cliente</h3>
            <form onsubmit="saveClient(event)" class="space-y-4">
                <input type="text" id="c-name" placeholder="Nombre completo" required class="w-full border p-2.5 rounded-lg">
                <input type="text" id="c-id" placeholder="Cédula o NIT" required class="w-full border p-2.5 rounded-lg">
                <input type="tel" id="c-phone" placeholder="Teléfono / Celular" required class="w-full border p-2.5 rounded-lg">
                <input type="email" id="c-email" placeholder="Correo (Opcional)" class="w-full border p-2.5 rounded-lg">
                <div class="flex gap-3">
                    <button type="button" onclick="closeModal('client-modal')" class="flex-1 py-2 text-slate-500 font-medium">Cancelar</button>
                    <button type="submit" class="flex-1 py-2 bg-emerald-600 text-white rounded-lg font-bold">Guardar Cliente</button>
                </div>
            </form>
        </div>
    </div>

    <div id="order-modal" class="fixed inset-0 bg-slate-900/60 hidden flex items-center justify-center p-4 z-50 overflow-y-auto">
        <div class="bg-white rounded-2xl w-full max-w-2xl p-6 shadow-2xl my-8">
            <h3 id="order-modal-title" class="text-xl font-bold mb-6 italic">Crear Orden de Trabajo</h3>
            <form id="order-form" onsubmit="handleOrderSubmit(event)" class="space-y-6">
                <input type="hidden" id="edit-index">
                
                <div class="bg-indigo-50 p-4 rounded-xl border border-indigo-100">
                    <label class="block text-sm font-bold text-indigo-700 mb-2">Seleccionar Cliente</label>
                    <select id="order-client-select" required class="w-full border-none p-2 rounded-lg bg-white shadow-sm focus:ring-2 focus:ring-indigo-500"></select>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-slate-600 mb-1">Estado de la Orden</label>
                        <select id="order-status" class="w-full border p-2 rounded-lg">
                            <option value="revision">En Revisión</option>
                            <option value="reparacion">En Reparación</option>
                            <option value="reparado">Reparado</option>
                            <option value="entregado">Entregado</option>
                        </select>
                    </div>
                </div>

                <div>
                    <div class="flex justify-between mb-2">
                        <label class="font-bold text-slate-700">Artículos / Equipos</label>
                        <button type="button" onclick="addItemRow()" class="text-indigo-600 text-sm font-bold hover:underline">+ Añadir Item</button>
                    </div>
                    <div id="items-container" class="space-y-4"></div>
                </div>

                <div class="flex gap-3">
                    <button type="button" onclick="closeModal('order-modal')" class="flex-1 py-3 text-slate-500">Cerrar</button>
                    <button type="submit" class="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-bold shadow-lg shadow-indigo-200">Guardar Orden</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // --- DATA MANAGEMENT ---
        let clients = JSON.parse(localStorage.getItem('ms_clients')) || [];
        let orders = JSON.parse(localStorage.getItem('ms_orders')) || [];
        // CORRECCIÓN: Contador persistente para el número de orden
        let lastOrderNum = parseInt(localStorage.getItem('ms_last_order_num')) || 0;

        // --- NAVIGATION ---
        function switchTab(tab) {
            document.getElementById('view-orders').classList.toggle('hidden', tab !== 'orders');
            document.getElementById('view-clients').classList.toggle('hidden', tab !== 'clients');
            document.getElementById('tab-orders').className = tab === 'orders' ? 'tab-active py-5' : 'py-5';
            document.getElementById('tab-clients').className = tab === 'clients' ? 'tab-active py-5' : 'py-5';
        }

        // --- CLIENT LOGIC ---
        function openClientModal() { document.getElementById('client-modal').classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        function saveClient(e) {
            e.preventDefault();
            const client = {
                id: document.getElementById('c-id').value,
                name: document.getElementById('c-name').value,
                phone: document.getElementById('c-phone').value,
                email: document.getElementById('c-email').value || 'Sin correo'
            };
            clients.push(client);
            localStorage.setItem('ms_clients', JSON.stringify(clients));
            renderClients();
            closeModal('client-modal');
            e.target.reset();
        }

        function renderClients() {
            const tbody = document.getElementById('clients-table-body');
            tbody.innerHTML = clients.map(c => `
                <tr class="hover:bg-slate-50 border-b border-slate-100">
                    <td class="px-6 py-4 font-semibold text-slate-800">${c.name}</td>
                    <td class="px-6 py-4 text-slate-600">${c.id}</td>
                    <td class="px-6 py-4 text-slate-600">${c.phone}</td>
                    <td class="px-6 py-4 text-slate-400 text-sm">${c.email}</td>
                </tr>
            `).join('');
            updateClientSelect();
        }

        function updateClientSelect() {
            const select = document.getElementById('order-client-select');
            select.innerHTML = '<option value="" disabled selected>Elija un cliente registrado...</option>' + 
                clients.map(c => `<option value="${c.id}">${c.name} (${c.id})</option>`).join('');
        }

        // --- ORDER LOGIC ---
        function openOrderModal(editIdx = null) {
            if (clients.length === 0) {
                alert("Primero debes crear un cliente para poder generar una orden.");
                switchTab('clients');
                return;
            }
            const modal = document.getElementById('order-modal');
            const form = document.getElementById('order-form');
            const title = document.getElementById('order-modal-title');
            const container = document.getElementById('items-container');
            
            form.reset();
            container.innerHTML = '';
            modal.classList.remove('hidden');

            if (editIdx !== null) {
                title.innerText = "Editar Orden " + orders[editIdx].orderNum;
                document.getElementById('edit-index').value = editIdx;
                const order = orders[editIdx];
                document.getElementById('order-client-select').value = order.clientId;
                document.getElementById('order-status').value = order.status;
                order.items.forEach(item => addItemRow(item));
            } else {
                title.innerText = "Crear Orden de Trabajo";
                document.getElementById('edit-index').value = "";
                addItemRow();
            }
            lucide.createIcons();
        }

        function addItemRow(data = {qty:1, name:'', desc:'', price:''}) {
            const div = document.createElement('div');
            div.className = "p-4 bg-slate-50 rounded-xl grid grid-cols-12 gap-2 relative border border-slate-200";
            div.innerHTML = `
                <div class="col-span-2"><input type="number" placeholder="Cant" value="${data.qty}" class="i-qty w-full border rounded p-1"></div>
                <div class="col-span-6"><input type="text" placeholder="Nombre Articulo" value="${data.name}" class="i-name w-full border rounded p-1"></div>
                <div class="col-span-4"><input type="number" placeholder="Valor $" value="${data.price}" class="i-price w-full border rounded p-1"></div>
                <div class="col-span-12"><textarea placeholder="Descripción" class="i-desc w-full border rounded p-1 text-sm">${data.desc}</textarea></div>
                <button type="button" onclick="this.parentElement.remove()" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full p-1"><i data-lucide="x" class="w-3 h-3"></i></button>
            `;
            document.getElementById('items-container').appendChild(div);
            lucide.createIcons();
        }

        function handleOrderSubmit(e) {
            e.preventDefault();
            const editIdx = document.getElementById('edit-index').value;
            const items = [];
            document.querySelectorAll('#items-container > div').forEach(row => {
                items.push({
                    qty: row.querySelector('.i-qty').value,
                    name: row.querySelector('.i-name').value,
                    price: parseFloat(row.querySelector('.i-price').value || 0),
                    desc: row.querySelector('.i-desc').value
                });
            });

            const clientId = document.getElementById('order-client-select').value;
            const client = clients.find(c => c.id === clientId);

            // CORRECCIÓN LÓGICA DE NÚMERO DE ORDEN
            let currentOrderNum;
            if (editIdx !== "") {
                currentOrderNum = orders[editIdx].orderNum; // Mantener original si es edición
            } else {
                lastOrderNum++; // Incrementar contador histórico
                currentOrderNum = "ORD-" + String(lastOrderNum).padStart(4, '0');
                localStorage.setItem('ms_last_order_num', lastOrderNum); // Guardar contador
            }

            const orderData = {
                orderNum: currentOrderNum,
                clientId: client.id,
                clientName: client.name,
                clientPhone: client.phone,
                status: document.getElementById('order-status').value,
                items: items,
                total: items.reduce((sum, i) => sum + i.price, 0),
                date: editIdx !== "" ? orders[editIdx].date : new Date().toLocaleDateString()
            };

            if (editIdx !== "") {
                orders[editIdx] = orderData;
            } else {
                orders.push(orderData);
            }

            localStorage.setItem('ms_orders', JSON.stringify(orders));
            renderOrders();
            closeModal('order-modal');
        }

        function renderOrders(dataToRender = orders) {
            const list = document.getElementById('orders-list');
            list.innerHTML = dataToRender.map((o, idx) => `
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-xs font-bold text-slate-400">${o.orderNum} | ${o.date}</span>
                        <span class="status-badge status-${o.status}">${o.status.toUpperCase()}</span>
                    </div>
                    <h4 class="font-bold text-slate-800 text-lg">${o.clientName}</h4>
                    <p class="text-sm text-slate-500 mb-4">${o.clientPhone}</p>
                    <div class="space-y-2 border-t pt-4">
                        ${o.items.map(i => `<p class="text-xs text-slate-600"><b>${i.qty}x</b> ${i.name} - $${i.price.toLocaleString()}</p>`).join('')}
                    </div>
                    <div class="flex justify-between items-center mt-6 border-t pt-4">
                        <span class="font-bold text-indigo-600 text-xl">$${o.total.toLocaleString()}</span>
                        <div class="flex gap-2">
                            <button onclick="openOrderModal(${idx})" class="p-2 text-slate-400 hover:text-indigo-600"><i data-lucide="edit-3" class="w-5 h-5"></i></button>
                            <button onclick="deleteOrder(${idx})" class="p-2 text-slate-400 hover:text-red-500"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function deleteOrder(idx) {
            if(confirm('¿Eliminar esta orden? El número de orden no se volverá a usar.')) {
                orders.splice(idx, 1);
                localStorage.setItem('ms_orders', JSON.stringify(orders));
                renderOrders();
            }
        }

        // --- SEARCH ---
        function filterContent() {
            const query = document.getElementById('globalSearch').value.toLowerCase();
            const filtered = orders.filter(o => 
                o.clientName.toLowerCase().includes(query) || 
                o.clientPhone.includes(query) || 
                o.orderNum.toLowerCase().includes(query)
            );
            renderOrders(filtered);
        }

        // Init
        renderClients();
        renderOrders();
        lucide.createIcons();
    </script>
</body>
</html>
